<!doctype html>
<html lang="he" dir="rtl">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>סיכום מקבילית</title>
<meta name="theme-color" content="#16a34a">
<link rel="manifest" href="manifest.webmanifest">
<style>
body{margin:0;font-family:Arial;background:#ecfdf5}
.wrap{max-width:900px;margin:20px auto;background:white;padding:24px;border-radius:20px}
h1{text-align:center}
.btn{display:none;background:#16a34a;color:white;border:none;padding:14px 20px;border-radius:14px;font-size:18px;margin-bottom:20px}
.card{background:#f0fdf4;border:1px solid #bbf7d0;padding:14px;border-radius:14px;margin:10px 0}
.math{font-weight:bold;font-size:20px}
</style>
</head>
<body>

<div class="wrap">
<div style="text-align:center;margin-bottom:20px"><button onclick="installApp()" style="background:#16a34a;color:white;border:none;padding:16px 24px;font-size:20px;border-radius:16px;cursor:pointer">📲 התקן למסך הבית</button></div>

<button id="installBtn" class="btn">התקן למסך הבית</button>

<h1>מקבילית</h1>

<div class="card">
מרובע שבו כל זוג צלעות נגדיות מקבילות.
</div>

<div class="card">
<div class="math">AB ∥ CD</div>
<div class="math">BC ∥ AD</div>
</div>

<div class="card">
צלעות נגדיות שוות
<div class="math">AB = CD</div>
<div class="math">BC = AD</div>
</div>

<div class="card">
זוויות נגדיות שוות
<div class="math">∠A = ∠C</div>
<div class="math">∠B = ∠D</div>
</div>

<div class="card">
זוויות סמוכות משלימות
<div class="math">∠A + ∠B = 180°</div>
</div>

<div class="card">
האלכסונים חוצים זה את זה
<div class="math">AO = OC</div>
<div class="math">BO = OD</div>
</div>

</div>

<script>
let deferredPrompt=null;

window.addEventListener('beforeinstallprompt',e=>{
e.preventDefault();
deferredPrompt=e;
document.getElementById("installBtn").style.display="block";
});

document.getElementById("installBtn").onclick=async()=>{
if(!deferredPrompt)return;
deferredPrompt.prompt();
await deferredPrompt.userChoice;
deferredPrompt=null;
};
</script>


<script src="install.js"></script>
</body>
</html>

<script>
let deferredPrompt;window.addEventListener("beforeinstallprompt",e=>{e.preventDefault();deferredPrompt=e;});function installApp(){if(deferredPrompt){deferredPrompt.prompt();deferredPrompt.userChoice.then(()=>{deferredPrompt=null});}else{alert("פתח בתפריט הדפדפן ⋮ ובחר הוסף למסך הבית");}}
</script>
