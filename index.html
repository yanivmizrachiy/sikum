<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/jsxgraph/distrib/jsxgraph.css">

<title>סיכום – מקבילית</title>

<link href="https://fonts.googleapis.com/css2?family=Assistant:wght@400;600;700&display=swap" rel="stylesheet">

<style>

body{
font-family:"Assistant",sans-serif;
background:#ffffff;
color:#000000;
margin:0;
}

.wrap{
max-width:720px;
margin:auto;
padding:40px 24px;
}

h1{
font-size:40px;
text-align:center;
margin-bottom:30px;
font-weight:700;
}

.card{
border:1px solid #000;
border-radius:10px;
padding:18px;
margin-bottom:18px;
font-size:20px;
line-height:1.7;
background:#fff;
}

.math{
font-size:22px;
font-weight:700;
margin-top:6px;
}

.install{
text-align:center;
margin-bottom:30px;
}

button{
background:#000;
color:#fff;
border:none;
padding:12px 24px;
border-radius:10px;
font-size:16px;
cursor:pointer;
}

.note{
margin-top:20px;
font-size:14px;
text-align:center;
}

</style>
<script src="https://cdn.jsdelivr.net/npm/jsxgraph/distrib/jsxgraphcore.js"></script>

<body>

<div class="wrap">

<div class="install">
<button id="installBtn">התקן אפליקציה</button>
<div class="card"><svg viewBox="0 0 500 300" style="width:100%"><polygon points="120,220 360,220 420,100 180,100" fill="none" stroke="#000" stroke-width="3"/><line x1="120" y1="220" x2="420" y2="100" stroke="#000" stroke-width="2" stroke-dasharray="6"/><line x1="360" y1="220" x2="180" y2="100" stroke="#000" stroke-width="2" stroke-dasharray="6"/><circle cx="120" cy="220" r="4" fill="#000"/><circle cx="360" cy="220" r="4" fill="#000"/><circle cx="420" cy="100" r="4" fill="#000"/><circle cx="180" cy="100" r="4" fill="#000"/><text x="105" y="240" font-size="18">A</text><text x="360" y="240" font-size="18">B</text><text x="425" y="100" font-size="18">C</text><text x="165" y="90" font-size="18">D</text></svg></div>

</div>
